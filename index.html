<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Keep body hidden until both React has hydrated and the Carbon
         stylesheet has loaded. This prevents flash of unstyled content.
         The body.ready class is added by entry-client.jsx after hydration,
         but only once the stylesheet is ready (see the onload logic below). -->
    <style>
      body {
        visibility: hidden;
      }
      body.ready {
        visibility: visible;
      }
    </style>

    <!--
      In production, Carbon's stylesheet is loaded non-blocking via preload.
      This eliminates the render-blocking penalty (~1,500 ms on a slow connection)
      that `<link rel="stylesheet">` incurs.

      How it works:
        1. rel="preload" fetches the CSS at high priority without blocking render.
        2. onload swaps rel to "stylesheet", applying the styles once downloaded.
        3. The noscript fallback ensures CSS still loads without JavaScript.
        4. body stays visibility:hidden until entry-client.jsx sets body.ready,
           which it defers until the stylesheet is confirmed loaded — so there
           is no flash of unstyled content.

      In development Vite injects CSS via JS modules, so the preload
      pattern is not used (the blocking link below is transformed by Vite).
    -->
    <link rel="stylesheet" href="/src/index.scss" />
    <title>Carbon React Router starter</title>
    <!--app-head-->
  </head>

  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/entry-client.jsx"></script>
  </body>
</html>
