name: Carbon React Router starter CI

on: [push]

jobs:
  run-defined-frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - name: Read .nvmrc
        run: echo ::set-output name=NODE_VERSION::$(cat .nvmrc)
        id: nvm
      - name: Use Node.js ${{ steps.nvm.outputs.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.nvm.outputs.NODE_VERSION }}
      - name: Validate package-lock.json is in sync
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json || (echo "package-lock.json is out of sync with package.json. Run 'npm install' locally and commit the changes." && exit 1)
      - run: npm ci
      - run: npm run build
      - run: npm run test
